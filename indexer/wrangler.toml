name = "littlejohn-indexer"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2026-07-01"

# Poll the chain once a minute.
[triggers]
crons = ["* * * * *"]

# Shared D1 database. Create it once (`wrangler d1 create littlejohn_index`) and
# paste the returned id below; the SAME id is bound on the app's Pages project.
[[d1_databases]]
binding = "DB"
database_name = "littlejohn_index"
database_id = "91db92fc-db70-4647-8757-e77aca96b7eb" # <- fill after `wrangler d1 create littlejohn_index`

# Live trade fan-out: one LiveFeed Durable Object per coin, addressed by token
# address. Viewers connect via GET /ws/0x<token>; the DO polls that coin and
# broadcasts new trades over WebSockets (see src/live.ts).
[[durable_objects.bindings]]
name = "LIVE"
class_name = "LiveFeed"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveFeed"]

# Defaults target Robinhood Chain testnet (chainId 46630). For mainnet set these
# via `wrangler secret`/dashboard vars or a separate [env.mainnet] block:
#   RPC_URL=https://rpc.mainnet.chain.robinhood.com  CHAIN_ID=4663
#   LAUNCHPAD / WETH / ROUTER / START_BLOCK = mainnet values (TBD)
[vars]
RPC_URL = "https://rpc.testnet.chain.robinhood.com"
CHAIN_ID = "46630"
LAUNCHPAD = "0xbABeA7f2e54dF349De3D743B9d55C33E6484cBD3"
WETH = "0xF13E5952780Cdcd2C17333129b5Bc5187ff07DC2"
ROUTER = "0x139D245cBe54dC332BbAf6191269b81D727466a8"
START_BLOCK = "90397141" # launchpad deploy block on testnet (0x56359d5)
CONFIRMATIONS = "5"
IPFS_GATEWAY = "https://gateway.pinata.cloud/ipfs/"
